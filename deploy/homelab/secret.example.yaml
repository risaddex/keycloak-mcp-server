# Example secret for the Keycloak MCP Server.
#
# DO NOT commit real values. Prefer materializing this via Bitwarden Secrets
# Manager / ExternalSecrets (your homelab convention) so the values never touch
# Git. This file only documents the expected keys.
#
# Generate the SSE API key with:  openssl rand -hex 32
#
# The workload requires a Secret named exactly "keycloak-mcp-secrets" in the
# "mcp" namespace (referenced via envFrom in manifests.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-mcp-secrets
  namespace: mcp
type: Opaque
stringData:
  KEYCLOAK_URL: "https://keycloak.daniloromano.dev"
  # Least privilege (recommended): a dedicated service-account client that lives
  # INSIDE your target realm, granted only the roles it needs from that realm's
  # built-in "realm-management" client (e.g. view-users / manage-users). This
  # account can manage ONLY this realm. Do NOT use a master super-admin.
  #
  # KEYCLOAK_ADMIN_REALM is the realm the client authenticates against (where the
  # client lives) — set it to your target realm, NOT "master".
  # Use "master" only if the assistant must manage multiple realms or create
  # realms (and even then, scope its roles — never the super-admin).
  KEYCLOAK_ADMIN_REALM: "meurealm"
  KEYCLOAK_CLIENT_ID: "keycloak-mcp"
  KEYCLOAK_CLIENT_SECRET: "REPLACE_ME"
  KEYCLOAK_VERIFY_SSL: "true"
  # Required: clients must send "Authorization: Bearer <this value>".
  KEYCLOAK_MCP_SSE_API_KEY: "REPLACE_WITH_openssl_rand_hex_32"
